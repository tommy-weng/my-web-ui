<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联调测试</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 300px; margin: 0 auto; }
        input { display: block; width: 80%; margin: 10px auto; padding: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h3>系统登录</h3>
        <input type="text" id="user" placeholder="用户名">
        <input type="password" id="pw" placeholder="密码">
        <button onclick="doLogin()">登录</button>
        <p id="msg"></p>
    </div>

    <script>
        async function doLogin() {
            const user = document.getElementById('user').value;
            const pw = document.getElementById('pw').value;
            const msgDom = document.getElementById('msg');

            try {
                // 向你的 Linux 服务器发送请求
                // 注意：如果 Linux 在云端，请将 localhost 换成服务器的公网 IP
                const response = await fetch('http://192.168.1.7:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pw })
                });

                const result = await response.json();
                msgDom.innerText = result.message;
                msgDom.style.color = response.ok ? 'green' : 'red';
            } catch (error) {
                msgDom.innerText = "无法连接到服务器，请检查后端是否运行";
            }
        }
    </script>
</body>
</html>
